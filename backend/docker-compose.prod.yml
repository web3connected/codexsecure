# CodexHash Production Docker Compose
# Quantum-resistant hashing service deployment for Web3Connected Ecosystem

version: '3.8'

services:
  codex-hash-backend:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: codex-hash-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - CODEX_HASH_PORT=8001
      - CODEX_ENVIRONMENT=production
      - CODEX_DEBUG=false
      - CODEX_LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - codex-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx reverse proxy for CodexHash
  codex-hash-nginx:
    image: nginx:alpine
    container_name: codex-hash-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/html:/var/www/html:ro
    depends_on:
      - codex-hash-backend
    networks:
      - codex-net
    command: ["/bin/sh", "-c", "nginx -g 'daemon off;'"]

networks:
  codex-net:
    external: true

volumes:
  codex-hash-data:
    driver: local
