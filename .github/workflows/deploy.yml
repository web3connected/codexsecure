name: Deploy CodexSecure to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PRODUCTION_HOST: ${{ secrets.DEPLOY_HOST || '45.79.180.207' }}
  PRODUCTION_USER: ${{ secrets.DEPLOY_USER || 'forge' }}
  PRODUCTION_DOMAIN: codexsecure.io
  PRODUCTION_PATH: /home/forge/codexsecure.io
  FRONTEND_PORT: 3003

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🟢 Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🏗️ Build Next.js application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: https://codexsecure.io/api
        NEXT_PUBLIC_SITE_URL: https://codexsecure.io

    - name: 🔐 Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H $PRODUCTION_HOST >> ~/.ssh/known_hosts

    - name: 📤 Sync files to production server
      run: |
        rsync -az --delete \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='.next' \
          --exclude='.env*' \
          ./ $PRODUCTION_USER@$PRODUCTION_HOST:$PRODUCTION_PATH/

    - name: 🚀 Deploy on production server
      run: |
        ssh -o StrictHostKeyChecking=no $PRODUCTION_USER@$PRODUCTION_HOST << 'EOF'
        set -e
        cd /home/forge/codexsecure.io

        echo "📦 Installing dependencies..."
        npm ci --production=false

        echo "🏗️ Building Next.js application..."
        NEXT_PUBLIC_API_URL=https://codexsecure.io/api \
        NEXT_PUBLIC_SITE_URL=https://codexsecure.io \
        NODE_ENV=production \
        npm run build

        mkdir -p logs

        if ! command -v pm2 &> /dev/null; then
          npm install -g pm2
        fi

        echo "🔄 Restarting PM2..."
        pm2 stop codexsecure 2>/dev/null || true
        pm2 delete codexsecure 2>/dev/null || true
        pm2 start ecosystem.config.js
        pm2 save

        echo "⏳ Waiting for app to start..."
        sleep 10

        if curl -sf http://localhost:3003 > /dev/null; then
          echo "✅ CodexSecure is healthy on port 3003"
        else
          echo "❌ Health check failed"
          pm2 logs --lines 30
          exit 1
        fi

        echo "🎉 CodexSecure deployment complete!"
        EOF

    - name: 🧪 Final verification
      run: |
        sleep 10
        curl -sf https://codexsecure.io > /dev/null && echo "✅ codexsecure.io is live" || echo "⚠️ Site check failed (may need Forge nginx config)"

