name: Deploy CodexSecure to Production

# Required GitHub Secrets:
#   DEPLOY_PRIVATE_KEY  — private SSH key for forge@45.79.180.207
#   FORGE_DEPLOY_HOOK   — (optional) Forge webhook URL to trigger server-side deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PRODUCTION_HOST: 45.79.180.207
  PRODUCTION_USER: forge
  PRODUCTION_PATH: /home/forge/codexsecure.io
  PORT: 3003

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🟢 Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install
      run: npm ci

    - name: 🏗️ Build
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: https://codexsecure.io/api
        NEXT_PUBLIC_SITE_URL: https://codexsecure.io
        NODE_ENV: production

    - name: 🔐 Setup SSH
      if: ${{ secrets.DEPLOY_PRIVATE_KEY != '' }}
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H $PRODUCTION_HOST >> ~/.ssh/known_hosts

    - name: 📤 Sync to server
      if: ${{ secrets.DEPLOY_PRIVATE_KEY != '' }}
      run: |
        rsync -az --delete \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='.env*' \
          -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
          ./ $PRODUCTION_USER@$PRODUCTION_HOST:$PRODUCTION_PATH/

    - name: 🚀 Server deploy
      if: ${{ secrets.DEPLOY_PRIVATE_KEY != '' }}
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
          $PRODUCTION_USER@$PRODUCTION_HOST << 'ENDSSH'
        set -e
        cd /home/forge/codexsecure.io
        npm ci --production=false
        NEXT_PUBLIC_API_URL=https://codexsecure.io/api \
        NEXT_PUBLIC_SITE_URL=https://codexsecure.io \
        NODE_ENV=production npm run build
        mkdir -p logs
        pm2 stop codexsecure-dev 2>/dev/null || true
        pm2 delete codexsecure-dev 2>/dev/null || true
        pm2 stop codexsecure-prod 2>/dev/null || true
        pm2 delete codexsecure-prod 2>/dev/null || true
        pm2 stop codexsecure 2>/dev/null || true
        pm2 delete codexsecure 2>/dev/null || true
        pm2 start ecosystem.config.js --only codexsecure-prod
        pm2 save
        sleep 8
        curl -sf http://localhost:3003 && echo '✅ healthy' || (pm2 logs codexsecure-prod --lines 20 --nostream; exit 1)
        ENDSSH

    - name: 🪝 Forge webhook (fallback)
      if: ${{ secrets.DEPLOY_PRIVATE_KEY == '' && secrets.FORGE_DEPLOY_HOOK != '' }}
      run: curl -s "${{ secrets.FORGE_DEPLOY_HOOK }}"

