name: CodexHash CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
    
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: 📦 Install Node.js dependencies
      run: npm ci
    
    - name: 🐍 Install Python dependencies
      run: |
        cd backend
        pip install -r requirements.txt
    
    - name: 🔍 Run ESLint
      run: npm run lint
    
    - name: 📝 Type checking (TypeScript)
      run: npx tsc --noEmit
    
    - name: 🏗️ Build Next.js application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8001
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    
    - name: 🧪 Test backend imports
      run: |
        cd backend
        python -c "
        import sys
        sys.path.append('src')
        from main import app
        print('✅ Backend application loads successfully')
        "
    
    - name: 🔐 Test hash algorithms
      run: |
        cd backend
        python -c "
        import sys
        sys.path.append('src')
        import uvicorn
        import requests
        import time
        from multiprocessing import Process
        from main import app
        
        def start_server():
            uvicorn.run(app, host='127.0.0.1', port=8001, log_level='error')
        
        print('🚀 Starting test server...')
        server = Process(target=start_server)
        server.start()
        time.sleep(5)
        
        try:
            # Test health endpoint
            print('🔍 Testing health endpoint...')
            health_response = requests.get('http://127.0.0.1:8001/health', timeout=10)
            assert health_response.status_code == 200
            print('✅ Health check passed')
            
            # Test hash endpoints
            algorithms = ['harmonic', 'sha3-256', 'blake2b']
            for algorithm in algorithms:
                print(f'� Testing {algorithm} algorithm...')
                hash_response = requests.post(
                    'http://127.0.0.1:8001/hash',
                    json={'data': f'test-{algorithm}', 'algorithm': algorithm},
                    timeout=10
                )
                assert hash_response.status_code == 200
                result = hash_response.json()
                assert 'hash' in result
                assert result['algorithm'] == algorithm
                print(f'✅ {algorithm} test passed')
            
            print('🎉 All CI tests passed!')
            
        except Exception as e:
            print(f'❌ CI test failed: {e}')
            sys.exit(1)
        finally:
            server.terminate()
            server.join()
        "