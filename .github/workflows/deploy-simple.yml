name: Deploy CodexHash to Forge Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH Access
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy CodexHash
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd ~/codexhash.io
            echo "🔄 Pulling latest code..."
            git reset --hard
            git pull origin main
            echo "📦 Installing dependencies..."
            npm ci --production=false
            echo "🏗️ Building Next.js application..."
            NEXT_PUBLIC_API_URL=https://codexhash.io/api NEXT_PUBLIC_SITE_URL=https://codexhash.io npm run build
            echo "🐍 Installing Python dependencies..."
            cd backend && pip3 install -r requirements.txt --user && cd ..
            echo "🔄 Restarting services..."
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save
            echo "✅ CodexHash deployment complete"
          EOF