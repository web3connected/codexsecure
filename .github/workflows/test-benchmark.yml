name: CodexHash Test & Benchmark

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run nightly benchmarks at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test-correctness:
    name: Correctness Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        npm ci
        cd NPMPackages/codexhash
        npm ci
        npm run build
        cd ../../
        pip install -r benchmarks/requirements.txt
    
    - name: Run Known Answer Tests
      run: |
        python3 tests/kat_manager.py validate
    
    - name: Run Quick Benchmark
      run: |
        python3 benchmarks/harness.py --quick --output-dir reports/ci
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.os }}-node${{ matrix.node-version }}
        path: |
          benchmarks/reports/
          tests/vectors/

  performance-benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[benchmark]')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        npm ci
        cd NPMPackages/codexhash
        npm ci
        npm run build
        cd ../../
        pip install -r benchmarks/requirements.txt
        pip install matplotlib seaborn
    
    - name: Run Full Benchmark
      run: |
        python3 benchmarks/harness.py --output-dir reports/nightly
    
    - name: Generate Plots
      run: |
        python3 benchmarks/plot_results.py reports/nightly/benchmark_results_*.json
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: nightly-benchmark-results
        path: |
          benchmarks/reports/nightly/
    
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Find the latest CSV summary
          const reportsDir = 'benchmarks/reports/nightly';
          const files = fs.readdirSync(reportsDir);
          const csvFile = files.find(f => f.endsWith('.csv'));
          
          if (csvFile) {
            const csvContent = fs.readFileSync(path.join(reportsDir, csvFile), 'utf8');
            const comment = `## 📊 Benchmark Results
            
            \`\`\`
            ${csvContent}
            \`\`\`
            
            Full results available in the artifacts.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

  security-analysis:
    name: Security Analysis
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        npm ci
        cd NPMPackages/codexhash
        npm ci
        npm run build
        cd ../../
        pip install -r benchmarks/requirements.txt
    
    - name: Run Cryptographic Tests
      run: |
        python3 benchmarks/harness.py --quick --output-dir reports/security
    
    - name: Check Acceptance Criteria
      run: |
        python3 -c "
        import json
        import sys
        
        # Load results
        with open('benchmarks/reports/security/benchmark_results_*.json', 'r') as f:
            results = json.load(f)
        
        # Check critical criteria
        failed = False
        for fn_name, fn_data in results.get('hash_functions', {}).items():
            if 'CodexHash' not in fn_name:
                continue
                
            # Check determinism
            det = fn_data.get('correctness', {}).get('determinism', {})
            if det.get('failed', 1) > 0:
                print(f'CRITICAL: {fn_name} failed determinism test')
                failed = True
            
            # Check avalanche effect
            avalanche = fn_data.get('correctness', {}).get('avalanche', {})
            mean_ratio = avalanche.get('mean_flip_ratio', 0)
            if not (0.48 <= mean_ratio <= 0.52):
                print(f'CRITICAL: {fn_name} avalanche effect out of range: {mean_ratio}')
                failed = True
            
            # Check bit balance
            balance = fn_data.get('correctness', {}).get('bit_balance', {})
            pass_pct = balance.get('pass_percentage', 0)
            if pass_pct < 95.0:
                print(f'CRITICAL: {fn_name} bit balance failed: {pass_pct}% passed')
                failed = True
        
        if failed:
            print('Security analysis FAILED - blocking deployment')
            sys.exit(1)
        else:
            print('Security analysis PASSED')
        "
    
    - name: Upload security results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-analysis
        path: benchmarks/reports/security/
