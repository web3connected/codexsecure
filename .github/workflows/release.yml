name: Production Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --production=false
    
    - name: Build for production
      run: npm run build
      env:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: https://codexhash.io/api
        NEXT_PUBLIC_SITE_URL: https://codexhash.io
    
    - name: Create deployment package
      run: |
        tar -czf codexhash-release.tar.gz \
          --exclude=node_modules/.cache \
          --exclude=.git \
          --exclude=.github \
          --exclude=logs \
          .next backend src public package*.json ecosystem.config.js
    
    - name: Deploy to production server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.FORGE_SERVER_IP }}
        username: ${{ secrets.FORGE_SERVER_USER }}
        key: ${{ secrets.FORGE_SSH_PRIVATE_KEY }}
        script: |
          # Create backup of current deployment
          cd /home/forge
          if [ -d "codexhash.io" ]; then
            cp -r codexhash.io codexhash.io.backup.$(date +%Y%m%d-%H%M%S)
          fi
          
          # Create deployment directory
          mkdir -p /home/forge/codexhash.io
          cd /home/forge/codexhash.io
          
          # Stop current services
          pm2 stop ecosystem.config.js || true
          
          # Pull latest code
          if [ -d ".git" ]; then
            git pull origin main
          else
            git clone https://github.com/web3connected/codexhash.git .
          fi
          
          # Install dependencies
          npm ci --production=false
          
          # Build application
          NEXT_PUBLIC_API_URL=https://codexhash.io/api \
          NEXT_PUBLIC_SITE_URL=https://codexhash.io \
          NODE_ENV=production \
          npm run build
          
          # Install Python dependencies
          cd backend
          pip3 install -r requirements.txt --user
          cd ..
          
          # Ensure logs directory exists
          mkdir -p logs
          
          # Install PM2 globally if needed
          if ! command -v pm2 &> /dev/null; then
            npm install -g pm2
          fi
          
          # Start services
          pm2 start ecosystem.config.js
          pm2 save
          
          # Generate startup script
          pm2 startup || true
          
          echo "🚀 Production deployment completed!"
    
    - name: Health check production
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.FORGE_SERVER_IP }}
        username: ${{ secrets.FORGE_SERVER_USER }}
        key: ${{ secrets.FORGE_SSH_PRIVATE_KEY }}
        script: |
          # Wait for services to start
          sleep 15
          
          # Test frontend
          if curl -f -s https://codexhash.io > /dev/null; then
            echo "✅ Frontend (https://codexhash.io) is live"
          else
            echo "❌ Frontend health check failed"
            exit 1
          fi
          
          # Test backend API
          if curl -f -s https://codexhash.io/api/health > /dev/null; then
            echo "✅ Backend API (https://codexhash.io/api) is live"
          else
            echo "❌ Backend API health check failed"
            exit 1
          fi
          
          # Test hash generation
          hash_result=$(curl -s -X POST https://codexhash.io/api/hash \
            -H "Content-Type: application/json" \
            -d '{"data": "production-test", "algorithm": "harmonic"}')
          
          if echo "$hash_result" | grep -q '"hash"'; then
            echo "✅ Hash generation is working"
          else
            echo "❌ Hash generation test failed"
            exit 1
          fi
          
          echo "🎉 All production health checks passed!"
          echo "🌐 CodexHash.io is live and fully operational!"
    
    - name: Create deployment summary
      if: success()
      run: |
        echo "## 🚀 Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**CodexHash.io has been successfully deployed to production!**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔗 Live URLs:" >> $GITHUB_STEP_SUMMARY
        echo "- **Main Site**: https://codexhash.io" >> $GITHUB_STEP_SUMMARY
        echo "- **API Health**: https://codexhash.io/api/health" >> $GITHUB_STEP_SUMMARY
        echo "- **API Documentation**: https://codexhash.io/api/docs" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Services Status:" >> $GITHUB_STEP_SUMMARY
        echo "- Frontend (Next.js): Running on port 3000" >> $GITHUB_STEP_SUMMARY
        echo "- Backend (FastAPI): Running on port 8001" >> $GITHUB_STEP_SUMMARY
        echo "- Quantum-resistant hashing: Operational" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Deployment completed at:** $(date)" >> $GITHUB_STEP_SUMMARY