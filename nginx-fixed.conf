# HTTP server (redirects to HTTPS)
server {
  listen 80;
  server_name codextime.io www.codextime.io;

  # Let's Encrypt challenge directory
  location /.well-known/acme-challenge/ {
    root /var/www/html;
    try_files $uri =404;
    auth_basic off;
    allow all;
  }

  # Redirect all other traffic to HTTPS
  location / {
    return 301 https://$server_name$request_uri;
  }
}

# HTTP server for codexhash.io (redirects to HTTPS)
server {
  listen 80;
  server_name codexhash.io www.codexhash.io;

  # Let's Encrypt challenge directory
  location /.well-known/acme-challenge/ {
    root /var/www/html;
    try_files $uri =404;
    auth_basic off;
    allow all;
  }

  # Redirect all other traffic to HTTPS
  location / {
    return 301 https://$server_name$request_uri;
  }
}

# HTTPS server for codextime.io
server {
  listen 443 ssl;
  server_name codextime.io www.codextime.io;

  # SSL configuration
  ssl_certificate /etc/nginx/ssl/server.crt;
  ssl_certificate_key /etc/nginx/ssl/server.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # API proxy to CodexTime container
  location / {
    proxy_pass http://codextime-production:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 86400;
  }

  # Specific API endpoints with optimized caching
  location /health {
    proxy_pass http://codextime-production:8000/health;
    proxy_cache_bypass 1;
    access_log off;
  }

  location /time {
    proxy_pass http://codextime-production:8000/time;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location /tiu {
    proxy_pass http://codextime-production:8000/tiu;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }
}

# HTTPS server for codexhash.io
server {
  listen 443 ssl;
  server_name codexhash.io www.codexhash.io;

  # SSL configuration for CodexHash
  ssl_certificate /etc/nginx/ssl/codexhash.crt;
  ssl_certificate_key /etc/nginx/ssl/codexhash.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Document root for static files
  root /var/www/codexhash.io;
  index index.html index.php;

  # Serve static files
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy to CodexHash backend
  location /api/ {
    proxy_pass http://172.17.0.1:8001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30;
    proxy_connect_timeout 10;
    proxy_send_timeout 30;
  }
}